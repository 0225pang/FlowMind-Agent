# DeepSeek API config template.
# Copy this file to application-deepseek.yml, then put your real API key there.
# application-deepseek.yml should stay local and should not be committed.

flowmind:
  llm:
    provider: deepseek
    base-url: https://api.deepseek.com
    chat-path: /chat/completions
    model: deepseek-chat
    api-key: PUT_YOUR_DEEPSEEK_API_TOKEN_HERE
    temperature: 0.7
    max-tokens: 4096
    connect-timeout-seconds: 15
    read-timeout-seconds: 120
