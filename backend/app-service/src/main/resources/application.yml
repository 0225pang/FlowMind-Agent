server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-response: true

spring:
  application:
    name: flowmind-app-service
  config:
    import: optional:classpath:application-local.yml
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  datasource:
    url: jdbc:mysql://localhost:3306/FlowMind?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&characterSetResults=utf8mb4&connectionCollation=utf8mb4_0900_ai_ci&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379

flowmind:
  minio:
    endpoint: http://localhost:9000
    bucket: flowmind-demo
  llm:
    provider: deepseek
    base-url: https://api.deepseek.com
    chat-path: /chat/completions
    model: deepseek-v4-flash
    api-key: ${FLOWMIND_LLM_API_KEY:}
    temperature: 0.7
    max-tokens: 4096
  tools:
    web:
      enabled: true
      search-url: https://duckduckgo.com/html/?q=
    lark-cli:
      enabled: true
      command: lark-cli
      timeout-seconds: 30
    xiaohongshu-mcp:
      # Adapter for https://github.com/xpzouying/xiaohongshu-mcp.
      # The Go MCP runtime is stored under ai-agent-service/integrations and is
      # started automatically with the backend when Go is available locally.
      enabled: true
      agent-enabled: true
      auto-start: true
      command: ${FLOWMIND_XHS_MCP_COMMAND:go}
      working-dir: ${FLOWMIND_XHS_MCP_WORKING_DIR:ai-agent-service/integrations/xiaohongshu-mcp}
      port: ${FLOWMIND_XHS_MCP_PORT:18060}
      headless: ${FLOWMIND_XHS_MCP_HEADLESS:true}
      browser-bin: ${FLOWMIND_XHS_MCP_BROWSER_BIN:}
      chrome-user-data-dir: ${FLOWMIND_XHS_MCP_CHROME_USER_DATA_DIR:.runtime/xiaohongshu/chrome-profile}
      cookies-path: ${FLOWMIND_XHS_MCP_COOKIES_PATH:.runtime/xiaohongshu/cookies.json}
      go-cache: ${FLOWMIND_XHS_MCP_GO_CACHE:.gocache/xiaohongshu-mcp}
      base-url: ${FLOWMIND_XHS_MCP_BASE_URL:http://localhost:18060}
      search-path: /api/v1/feeds/search
      detail-path: /api/v1/feeds/detail
      timeout-seconds: 120
      default-limit: 8
      mock-fallback: true
  feishu:
    mode: mock
    knowledge-base:
      name: 保研知识库
      folder-token: KELsfW0jvlHcVqdiuTncQ66Lnnc
      url: https://ycn1ft0idflw.feishu.cn/drive/folder/KELsfW0jvlHcVqdiuTncQ66Lnnc
  embedding:
    provider: dashscope
    api-key: ${FLOWMIND_EMBEDDING_API_KEY:}
    model: text-embedding-v4
  weaviate:
    enabled: true
    base-url: http://localhost:18080
    scheme: http
  vector-demo:
    enabled: true
    fallback-enabled: true
    max-top-k: 20
    max-distance: 0.5
    agent-enabled: true
    agent-top-k: 5
    always-search: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
